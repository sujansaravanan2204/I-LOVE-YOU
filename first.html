```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Pavithra ❤️</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }

body {
    background:black;
    color:white;
    overflow:hidden;
}

/* VIDEO BACKGROUND */
video {
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* OVERLAY */
.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    z-index:-1;
}

/* GLASS UI */
.glass {
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    padding:30px;
    backdrop-filter: blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    text-align:center;
    max-width:90%;
}

/* SECTIONS */
.section {
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transition:1s;
}
.active { opacity:1; z-index:5; }

/* NEON TEXT */
.neon {
    font-size:2.5rem;
    color:#ff4d6d;
    text-shadow:0 0 10px #ff4d6d,0 0 30px #ff4d6d;
}

/* BUTTON */
button {
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

/* SKIP BUTTON */
.skip {
    position:absolute;
    top:20px;
    right:20px;
    background:rgba(0,0,0,0.6);
}

/* PARTICLES */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* TYPE TEXT */
.type {
    font-size:1.5rem;
    max-width:80%;
    text-align:center;
}
</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop>
    <source src="intro.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<canvas id="particles"></canvas>

<audio id="music" src="music.mp3" loop></audio>

<!-- INTRO -->
<div class="section active" id="intro">
    <div class="glass">
        <h1 class="neon">Pavithra Vidhukshana ❤️</h1>
        <p>aka Kuttima… my Vidhuma</p>
        <button onclick="start()">Start</button>
    </div>
    <button class="skip" onclick="skipIntro()">Skip Intro</button>
</div>

<!-- STORY -->
<div class="section" id="scene1">
    <div class="glass">
        <div class="type" id="text1"></div>
    </div>
</div>

<div class="section" id="scene2">
    <div class="glass">
        <div class="type" id="text2"></div>
    </div>
</div>

<!-- INTERACTIVE -->
<div class="section" id="choice">
    <div class="glass">
        <h2>Choose ❤️</h2>
        <button onclick="pathLove()">How much do I love you?</button>
        <button onclick="pathFuture()">Our future?</button>
    </div>
</div>

<div class="section" id="result">
    <div class="glass">
        <div class="type" id="resultText"></div>
    </div>
</div>

<!-- FINAL -->
<div class="section" id="final">
    <div class="glass">
        <h1 class="neon">I Love You Kuttima ❤️</h1>
        <p>Forever yours… Vidhuma 💫</p>
    </div>
</div>

<script>
const sections = document.querySelectorAll(".section");
let current = 0;

function show(i){
    sections.forEach(s => s.classList.remove("active"));
    sections[i].classList.add("active");
    current = i;
}

function start(){
    document.getElementById("music").play();
    show(1);

    type("text1","From the moment I met you, Pavithra… everything changed.");

    setTimeout(()=>{
        show(2);
        type("text2","Kuttima… you became my peace, my chaos, my everything ❤️");
    },5000);

    setTimeout(()=> show(3),10000);
}

function skipIntro(){
    start();
}

function pathLove(){
    show(4);
    type("resultText","I don’t love you a little… I love you in every second, every breath, every version of me.");
    setTimeout(()=>show(5),6000);
}

function pathFuture(){
    show(4);
    type("resultText","I see you in my future… in every dream… in every life I wish to live.");
    setTimeout(()=>show(5),6000);
}

function type(id,text){
    let i=0;
    let el=document.getElementById(id);
    el.innerHTML="";
    let inter=setInterval(()=>{
        el.innerHTML+=text[i];
        i++;
        if(i>=text.length) clearInterval(inter);
    },40);
}

/* PARTICLE SYSTEM */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];
for(let i=0;i<100;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2+1,
        dx:Math.random()-0.5,
        dy:Math.random()-0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,77,109,0.7)";
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
