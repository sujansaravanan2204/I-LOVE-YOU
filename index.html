<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Pavithra ❤️</title>

<style>

/* ===== GLOBAL ===== */
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body {
    background:black;
    color:white;
    overflow:hidden;
}

/* VIDEO */
video {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* OVERLAY */
.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    z-index:-1;
}

/* SECTIONS */
.section {
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transition:1s;
}

.active {
    opacity:1;
    z-index:5;
}

/* GLASS */
.glass {
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    padding:40px 30px;
    backdrop-filter: blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    text-align:center;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    box-shadow: 0 0 30px rgba(255,77,109,0.2);
}

/* TEXT */
.neon {
    font-size:2.5rem;
    color:#ff4d6d;
    text-shadow:0 0 10px #ff4d6d,0 0 30px #ff4d6d;
}

.type {
    font-size:1.6rem;
    line-height:1.6;
    max-width:80%;
    text-align:center;
    opacity:0;
    transition: opacity 1.5s ease;
}

/* BUTTON */
button {
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

/* PARTICLES */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<video autoplay muted loop>
    <source src="intro.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<canvas id="particles"></canvas>

<!-- HOME -->
<div class="section active">
    <div class="glass">
        <h1 class="neon">Pavithra Vidhukshana ❤️</h1>
        <p>Kuttima… my Vidhuma</p>
        <button onclick="startStory()">Start</button>
    </div>
</div>

<!-- SCENE 1 -->
<div class="section">
    <div class="glass">
        <div class="type" id="text1"></div>
    </div>
</div>

<!-- SCENE 2 -->
<div class="section">
    <div class="glass">
        <div class="type" id="text2"></div>
    </div>
</div>

<!-- CHOICE -->
<div class="section">
    <div class="glass">
        <button onclick="pathLove()">What I felt</button>
        <button onclick="pathFuture()">Something I never told you</button>
    </div>
</div>

<!-- RESULT -->
<div class="section">
    <div class="glass">
        <div class="type" id="resultText"></div>
    </div>
</div>

<!-- FINAL -->
<div class="section">
    <div class="glass">
        <h1 class="neon">I Love You ❤️</h1>
    </div>
</div>

<script>

/* SECTIONS */
const sections = document.querySelectorAll(".section");

function show(i){
    sections.forEach(s=>s.classList.remove("active"));
    sections[i].classList.add("active");
}

/* CINEMATIC TEXT */
function cinematicText(id, lines, delay=2500){
    let el = document.getElementById(id);
    let i = 0;

    function next(){
        if(i >= lines.length) return;

        el.style.opacity = 0;

        setTimeout(()=>{
            el.innerHTML = lines[i];
            el.style.opacity = 1;
            i++;
            setTimeout(next, delay);
        }, 800);
    }

    next();
}

/* STORY */
function startStory(){
    document.getElementById("music").play().catch(()=>{});
    show(1);

    cinematicText("text1",[
        "We met on Hinge…",
        "We talked for a month…",
        "And then… Feb 25 happened."
    ]);

    setTimeout(()=>{
        show(2);
        cinematicText("text2",[
            "That day… something changed.",
            "You became my kuttima ❤️"
        ]);
    },7000);

    setTimeout(()=>show(3),14000);
}

/* PATHS */
function pathLove(){
    show(4);
    cinematicText("resultText",[
        "That day… 25 felt different.",
        "That’s when I started falling for you."
    ]);
    setTimeout(()=>show(5),7000);
}

function pathFuture(){
    show(4);
    cinematicText("resultText",[
        "February was not just another month.",
        "It was the start of us."
    ]);
    setTimeout(()=>show(5),7000);
}

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];

for(let i=0;i<100;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2+1,
        dx:Math.random()-0.5,
        dy:Math.random()-0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,77,109,0.7)";
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
