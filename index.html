<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Pavithra ❤️</title>

<style>

/* ================= GLOBAL ================= */
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body {
    background:black;
    color:white;
    overflow:hidden;
}

/* ================= INTRO (MOVIE LOGO) ================= */
.intro {
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    flex-direction:column;
}

/* RED GLOW BACKGROUND */
.light-rays {
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(255,0,0,0.25), transparent 60%);
    filter: blur(80px);
    animation: pulse 4s infinite;
}

@keyframes pulse {
    0%{opacity:0.2;}
    50%{opacity:0.8;}
    100%{opacity:0.2;}
}

/* LOGO TEXT */
#logo {
    font-size:10rem;
    font-weight:bold;
    color:#e50914;
    letter-spacing:5px;
    opacity:0;
    transform:scale(0.2);
    transition:1.2s cubic-bezier(0.2,1,0.3,1);
}

/* LOGO ANIMATIONS */
.show { opacity:1; transform:scale(1.4); }
.settle { transform:scale(1); }
.expand { letter-spacing:35px; }

.glow {
    text-shadow:0 0 20px #ff0000,0 0 80px #ff4d6d;
}

/* ================= BACKGROUND VIDEO ================= */
video {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* DARK OVERLAY */
.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    z-index:-1;
}

/* ================= SECTIONS ================= */
.section {
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transition:1s;
}

.active {
    opacity:1;
    z-index:5;
}

/* ================= GLASS BOX (FIXED ALIGNMENT) ================= */
.glass {
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    padding:40px 30px; /* 🔥 better spacing */
    backdrop-filter: blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    text-align:center;

    display:flex;               /* 🔥 center fix */
    justify-content:center;
    align-items:center;
    flex-direction:column;

    box-shadow: 0 0 30px rgba(255,77,109,0.2);
}

/* ================= TEXT STYLES ================= */
.neon {
    font-size:2.5rem;
    color:#ff4d6d;
    text-shadow:0 0 10px #ff4d6d,0 0 30px #ff4d6d;
}

.type {
    font-size:1.6rem;
    line-height:1.6; /* 🔥 spacing fix */
    max-width:80%;
    text-align:center;
}

/* ================= BUTTON ================= */
button {
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

/* ================= PARTICLES ================= */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

</style>
</head>

<body>

<!-- ================= INTRO SCREEN ================= -->
<div class="intro" id="introScreen">
    <div class="light-rays"></div>
    <div id="logo">V</div>
</div>

<!-- ================= AUDIO FILES ================= -->
<audio id="boom" src="boom.mp3"></audio>
<audio id="whoosh" src="whoosh.mp3"></audio>
<audio id="music" src="music.mp3" loop></audio>

<!-- ================= BACKGROUND ================= -->
<video autoplay muted loop>
    <source src="intro.mp4" type="video/mp4">
</video>
<div class="overlay"></div>
<canvas id="particles"></canvas>

<!-- ================= HOME ================= -->
<div class="section active" id="home">
    <div class="glass">
        <h1 class="neon">Pavithra Vidhukshana ❤️</h1>
        <p>Kuttima… my Vidhuma</p>
        <button onclick="startStory()">Start</button>
    </div>
</div>

<!-- ================= SCENE 1 ================= -->
<div class="section" id="scene1">
    <div class="glass">
        <div class="type" id="text1"></div>
    </div>
</div>

<!-- ================= SCENE 2 ================= -->
<div class="section" id="scene2">
    <div class="glass">
        <div class="type" id="text2"></div>
    </div>
</div>

<!-- ================= CHOICE ================= -->
<div class="section" id="choice">
    <div class="glass">
        <button onclick="pathLove()">How much do I love you?</button>
        <button onclick="pathFuture()">Our future?</button>
    </div>
</div>

<!-- ================= RESULT ================= -->
<div class="section" id="result">
    <div class="glass">
        <div class="type" id="resultText"></div>
    </div>
</div>

<!-- ================= FINAL ================= -->
<div class="section" id="final">
    <div class="glass">
        <h1 class="neon">I Love You ❤️</h1>
    </div>
</div>

<script>

/* ================= INTRO ANIMATION ================= */
window.onload = function(){

    const logo = document.getElementById("logo");
    const intro = document.getElementById("introScreen");

    setTimeout(()=>{
        document.getElementById("boom").play().catch(()=>{});
        logo.classList.add("show","glow");
    },800);

    setTimeout(()=>{
        logo.classList.add("settle");
    },2000);

    setTimeout(()=>{
        document.getElementById("whoosh").play().catch(()=>{});
        logo.textContent="VIDHUU";
        logo.classList.add("expand");
    },3000);

    setTimeout(()=>{
        intro.style.opacity="0";
        intro.style.transition="1s";
        setTimeout(()=> intro.style.display="none",1000);
    },5500);

};

/* ================= STORY ================= */
const sections = document.querySelectorAll(".section");

function show(i){
    sections.forEach(s=>s.classList.remove("active"));
    sections[i].classList.add("active");
}

function startStory(){
    document.getElementById("music").play().catch(()=>{});
    show(1);
    type("text1","From the moment I met you… everything changed.");

    setTimeout(()=>{
        show(2);
        type("text2","Kuttima...<br>you are my everything ❤️"); /* 🔥 better alignment */
    },5000);

    setTimeout(()=>show(3),10000);
}

function pathLove(){
    show(4);
    type("resultText","I love you in every second of my life.");
    setTimeout(()=>show(5),6000);
}

function pathFuture(){
    show(4);
    type("resultText","I see you in every future of mine.");
    setTimeout(()=>show(5),6000);
}

/* ================= TYPE EFFECT ================= */
function type(id,text){
    let i=0;
    let el=document.getElementById(id);
    el.innerHTML="";
    let inter=setInterval(()=>{
        el.innerHTML+=text[i];
        i++;
        if(i>=text.length) clearInterval(inter);
    },40);
}

/* ================= PARTICLES ================= */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];
for(let i=0;i<100;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2+1,
        dx:Math.random()-0.5,
        dy:Math.random()-0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,77,109,0.7)";
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });
    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
```
