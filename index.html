<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Pavithra ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}
body{background:black;color:white;overflow:hidden;}

video{
    position:fixed;width:100%;height:100%;
    object-fit:cover;z-index:-2;
}

.overlay{
    position:fixed;width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    z-index:-1;
}

/* SECTIONS */
.section{
    position:absolute;width:100%;height:100vh;
    display:flex;justify-content:center;align-items:center;
    flex-direction:column;
    opacity:0;
    transform:scale(0.95);
    transition:1s;
}
.active{
    opacity:1;
    transform:scale(1);
    z-index:5;
}

/* BOX */
.glass{
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    padding:30px;
    backdrop-filter: blur(15px);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    text-align:center;
}

/* TEXT */
.neon{
    font-size:2.3rem;
    color:#ff4d6d;
}

.fadeText{
    font-size:1.5rem;
    opacity:0;
    transition:opacity 1.5s ease;
    max-width:80%;
}
.showText{opacity:1;}

button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

input{
    padding:10px;
    border-radius:10px;
    border:none;
    text-align:center;
}

/* MEMORY */
.memory img{
    width:200px;
    border-radius:10px;
}

/* HEART */
.heart{
    position:absolute;
    animation:fade 1s forwards;
}
@keyframes fade{
    to{opacity:0; transform:translateY(-20px);}
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<video autoplay muted loop>
<source src="intro.mp4">
</video>

<div class="overlay"></div>

<!-- HOME -->
<div class="section active">
<div class="glass">
<h1 class="neon">Pavithra ❤️</h1>
<p>Kuttima… my Vidhuma</p>
<button onclick="start()">Start</button>
</div>
</div>

<!-- STORY -->
<div class="section">
<div class="glass">
<div id="story" class="fadeText"></div>
</div>
</div>

<!-- CHOICE -->
<div class="section">
<div class="glass">
<button onclick="path1()">What I felt</button>
<button onclick="path2()">Something I never told you</button>
<p style="font-size:0.8rem;">(Some things are hidden… explore)</p>
</div>
</div>

<!-- RESULT -->
<div class="section">
<div class="glass">
<div id="result" class="fadeText"></div>
<p style="font-size:0.8rem;">Maybe numbers matter too…</p>
</div>
</div>

<!-- PUZZLE -->
<div class="section">
<div class="glass">
<p>Enter what matters</p>
<input id="code" placeholder="????">
<button onclick="unlock()">Unlock</button>

<p style="font-size:0.8rem;">
Think about our first day… and what I call you ❤️
</p>
</div>
</div>

<!-- MEMORY -->
<div class="section">
<div class="glass memory">
<p class="fadeText showText">You remembered… ❤️</p>

<img src="memory1.jpg">
<p>That day… I was nervous</p>

<img src="memory2.jpg">
<p>This is when you became important</p>

<button onclick="final()">Continue</button>
</div>
</div>

<!-- FINAL -->
<div class="section">
<div class="glass">
<h1 class="neon">I Love You ❤️</h1>
</div>
</div>

<script>

let sections=document.querySelectorAll(".section");

function show(i){
    sections.forEach(s=>s.classList.remove("active"));
    sections[i].classList.add("active");
}

/* CINEMATIC TEXT */
function cinematicText(id, lines, delay=2500){
    let el=document.getElementById(id);
    let i=0;

    function next(){
        if(i>=lines.length) return;

        el.classList.remove("showText");

        setTimeout(()=>{
            el.innerHTML=lines[i];
            el.classList.add("showText");
            i++;
            setTimeout(next,delay);
        },800);
    }
    next();
}

/* START */
function start(){
    document.getElementById("music").play().catch(()=>{});
    show(1);

    cinematicText("story",[
        "We met on Hinge…",
        "We talked for a month…",
        "And then… Feb 25 happened.",
        "Something changed."
    ]);

    setTimeout(()=>show(2),9000);
}

/* PATHS */
function path1(){
    show(3);
    cinematicText("result",[
        "That day… 25 felt different."
    ]);
    setTimeout(()=>show(4),4000);
}

function path2(){
    show(3);
    cinematicText("result",[
        "February was not just another month."
    ]);
    setTimeout(()=>show(4),4000);
}

/* HIDDEN CLUE */
document.body.addEventListener("click",(e)=>{
    if(e.clientX < 100 && e.clientY < 100){
        alert("You became my kuttima ❤️");
    }
});

/* PUZZLE */
let tries=0;

function unlock(){
    let val=document.getElementById("code").value.toLowerCase();
    tries++;

    if(val==="2502kuttima"){
        show(5);
    }else{
        if(tries==2){
            alert("Maybe… 25/02 means something ❤️");
        }
        else if(tries==3){
            alert("And maybe… what I call you ❤️");
        }
        else{
            alert("Not quite… look deeper ❤️");
        }
    }
}

function final(){
    show(6);
}

/* HEART EFFECT */
document.onclick=(e)=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=e.pageX+"px";
    h.style.top=e.pageY+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
};

</script>

</body>
</html>
