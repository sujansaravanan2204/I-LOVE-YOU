<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Kuttima ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:black;color:white;overflow:hidden;}

.section{
    position:absolute;width:100%;height:100vh;
    display:flex;justify-content:center;align-items:center;
    flex-direction:column;opacity:0;transition:1s;
}
.active{opacity:1;z-index:5;}

.glass{
    position:relative;
    background:rgba(255,255,255,0.08);
    border-radius:20px;padding:50px 40px;
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    text-align:center;
    max-width:600px;width:90%;
    box-shadow:0 0 30px rgba(255,77,109,0.2);
}

.neon{
    font-size:2.5rem;color:#ff4d6d;
    text-shadow:0 0 10px #ff4d6d,0 0 30px #ff4d6d;
    margin-bottom:15px;
}

.type{
    font-size:1.4rem;line-height:1.7;
    opacity:0;transition:1.5s;
}

button{
    margin-top:20px;padding:12px 28px;
    border:none;border-radius:30px;
    background:#ff4d6d;color:white;
    cursor:pointer;font-size:1rem;
}

.back{
    position:absolute;top:25px;left:30px;
    font-size:30px;cursor:pointer;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="music.mp3">
</audio>

<canvas id="particles"></canvas>

<!-- HOME -->
<div class="section active">
<div class="glass">
<h1 class="neon">Kuttima ❤️</h1>
<p>This isn’t just a page… this is us.</p>
<button onclick="startStory()">Start</button>
</div>
</div>

<!-- STORY SCREENS -->
<div class="section"><div class="glass"><div class="type" id="t1"></div></div></div>
<div class="section"><div class="glass"><div class="type" id="t2"></div></div></div>
<div class="section"><div class="glass"><div class="type" id="t3"></div></div></div>
<div class="section"><div class="glass"><div class="type" id="t4"></div></div></div>

<!-- CHOICE -->
<div class="section">
<div class="glass">
<button onclick="pathLove()">How much do I love you?</button>
<button onclick="pathFuture()">Our future?</button>
</div>
</div>

<!-- RESULT -->
<div class="section">
<div class="back" onclick="goBack()">←</div>
<div class="glass"><div class="type" id="result"></div></div>
</div>

<!-- FINAL -->
<div class="section">
<div class="back" onclick="goBack()">←</div>
<div class="glass"><h1 class="neon">I Love You ❤️</h1></div>
</div>

<!-- PROPOSAL -->
<div class="section">
<div class="back" onclick="goBack()">←</div>
<div class="glass" id="proposalBox">
<h2 class="neon">Can I call you mine? ❤️</h2>
<button onclick="sayYes()">Yes 💖</button>
<button id="noBtn" onmouseover="runAway()">No 😈</button>
</div>
</div>

<script>

const sections=document.querySelectorAll(".section");
function show(i){
    sections.forEach(s=>s.classList.remove("active"));
    sections[i].classList.add("active");
}

function text(id,content){
    let el=document.getElementById(id);
    el.innerHTML=content;
    el.style.opacity=1;
}

/* START */
function startStory(){

let m=document.getElementById("music");
m.volume=0;
m.play();

let v=0;
let f=setInterval(()=>{
if(v<0.6){v+=0.02;m.volume=v;}
else clearInterval(f);
},100);

show(1);
text("t1","It started from Hinge… just a normal match… nothing special.");

setTimeout(()=>{
show(2);
text("t2","But then I saw you… at our spot in MG Road… playing with that ginger cat… and damn… you were stunning.");
},6000);

setTimeout(()=>{
show(3);
text("t3","That moment when you held my hand… I swear… butterflies went crazy inside me.");
},12000);

setTimeout(()=>{
show(4);
text("t4","And in that metro ride… when we both knew… it wasn’t just a meetup… it was a date.");
},18000);

setTimeout(()=>show(5),24000);
}

/* PATHS */
function pathLove(){
show(6);
text("result","It’s not just love… it’s how your voice calms me… how you make me feel safe.");
setTimeout(()=>show(7),6000);
setTimeout(()=>show(8),10000);
}

function pathFuture(){
show(6);
text("result","Even after fights… you stayed… you chose me… and that’s when I knew I want you.");
setTimeout(()=>show(7),6000);
setTimeout(()=>show(8),10000);
}

/* BACK */
function goBack(){show(5);}

/* YES */
function sayYes(){
explode();
setTimeout(()=>alert("You just made me the happiest ❤️"),1500);
}

/* HEART EXPLOSION */
function explode(){
for(let i=0;i<40;i++){
let h=document.createElement("div");
h.innerHTML="❤️";
h.style.position="fixed";
h.style.left="50%";
h.style.top="50%";
document.body.appendChild(h);

let x=(Math.random()-0.5)*400;
let y=(Math.random()-0.5)*400;

h.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{duration:1500});

setTimeout(()=>h.remove(),1500);
}
}

/* NO BUTTON (FIXED) */
function runAway(){
let btn=document.getElementById("noBtn");
let box=document.getElementById("proposalBox");

let maxX=box.offsetWidth-100;
let maxY=box.offsetHeight-50;

btn.style.position="absolute";
btn.style.left=Math.random()*maxX+"px";
btn.style.top=Math.random()*maxY+"px";
}

/* PARTICLES (ANIMATED) */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
dx:(Math.random()-0.5)*0.5,
dy:(Math.random()-0.5)*0.5,
r:Math.random()*2+1
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,77,109,0.7)";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
