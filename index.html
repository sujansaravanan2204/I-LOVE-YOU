<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Pavithra ❤️</title>

<style>

/* ===== GLOBAL ===== */
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body {
    background:black;
    color:white;
    overflow:hidden;
}

/* ===== SECTIONS ===== */
.section {
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transition:1s;
}

.active {
    opacity:1;
    z-index:5;
}

/* ===== GLASS ===== */
.glass {
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    padding:50px 40px; /* restored spacing */
    backdrop-filter: blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    text-align:center;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    max-width:600px;
    width:90%;

    box-shadow: 0 0 30px rgba(255,77,109,0.2);
}

/* ===== TEXT ===== */
.neon {
    font-size:2.6rem;
    color:#ff4d6d;
    text-shadow:0 0 10px #ff4d6d,0 0 30px #ff4d6d;
    margin-bottom:15px;
}

.type {
    font-size:1.5rem;
    line-height:1.7;
    max-width:85%;
    text-align:center;
    opacity:0;
    transition: opacity 1.5s ease;
}

/* ===== BUTTON ===== */
button {
    margin-top:25px;
    padding:12px 28px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    font-size:1rem;
}

/* ===== BACK BUTTON ===== */
.back {
    position:absolute;
    top:25px;
    left:30px;
    font-size:30px;
    cursor:pointer;
    opacity:0.8;
    transition:0.3s;
}

.back:hover {
    opacity:1;
    transform:scale(1.2);
}

/* ===== PARTICLES ===== */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<canvas id="particles"></canvas>

<!-- HOME -->
<div class="section active">
    <div class="glass">
        <h1 class="neon">Pavithra Vidhukshana ❤️</h1>
        <p>Kuttima… my Vidhuma</p>
        <button onclick="startStory()">Start</button>
    </div>
</div>

<!-- SCENE 1 -->
<div class="section">
    <div class="glass">
        <div class="type" id="text1"></div>
    </div>
</div>

<!-- SCENE 2 -->
<div class="section">
    <div class="glass">
        <div class="type" id="text2"></div>
    </div>
</div>

<!-- CHOICE -->
<div class="section">
    <div class="glass">
        <button onclick="pathLove()">How much do I love you?</button>
        <button onclick="pathFuture()">Our future?</button>
    </div>
</div>

<!-- RESULT -->
<div class="section">
    <div class="back" onclick="goBack()">←</div>
    <div class="glass">
        <div class="type" id="resultText"></div>
    </div>
</div>

<!-- FINAL -->
<div class="section">
    <div class="back" onclick="goBack()">←</div>
    <div class="glass">
        <h1 class="neon">I Love You ❤️</h1>
    </div>
</div>

<!-- PROPOSAL -->
<div class="section">
    <div class="glass">

        <div class="type" id="proposalText1"></div>
        <h2 class="neon" id="proposalText2" style="opacity:0;"></h2>

        <button onclick="sayYes()">Yes 💖</button>
        <button onclick="sayNo()">No 😅</button>

    </div>
</div>

<script>

/* ===== SECTIONS ===== */
const sections = document.querySelectorAll(".section");

function show(i){
    sections.forEach(s=>s.classList.remove("active"));
    sections[i].classList.add("active");
}

/* ===== TEXT ===== */
function cinematicText(id, text) {
    let el = document.getElementById(id);

    el.innerHTML = text;
    el.style.opacity = 0;

    setTimeout(()=> el.style.opacity = 1, 100);
    setTimeout(()=> el.style.opacity = 0, 4000);
}

/* ===== START ===== */
function startStory(){

    const music = document.getElementById("music");

    music.volume = 0;
    music.play().then(()=>{
        let vol = 0;
        let fade = setInterval(()=>{
            if(vol < 0.6){
                vol += 0.02;
                music.volume = vol;
            } else {
                clearInterval(fade);
            }
        },100);
    }).catch(()=>{});

    show(1);
    cinematicText("text1","From the moment I met you… everything changed.");

    setTimeout(()=>{
        show(2);
        cinematicText("text2","Kuttima... you are my everything ❤️");
    },5000);

    setTimeout(()=>show(3),10000);
}

/* ===== PATHS ===== */
function pathLove(){
    show(4);
    cinematicText("resultText","I love you in every second of my life.");
    setTimeout(()=>show(5),6000);
    setTimeout(()=>showProposal(),9000);
}

function pathFuture(){
    show(4);
    cinematicText("resultText","I see you in every future of mine.");
    setTimeout(()=>show(5),6000);
    setTimeout(()=>showProposal(),9000);
}

/* ===== PROPOSAL ===== */
function showProposal(){
    show(6);

    cinematicText("proposalText1","After everything we've shared...");

    setTimeout(()=>{
        let el = document.getElementById("proposalText2");
        el.innerHTML = "Can I call you mine? ❤️";
        el.style.opacity = 1;
    },2500);
}

/* ===== BUTTONS ===== */
function sayYes(){
    alert("You just made me really, really happy ❤️");
}

function sayNo(){
    alert("Okay… but I'm still not giving up on you 😌");
}

/* ===== BACK ===== */
function goBack(){
    show(3);
}

/* ===== PARTICLES ===== */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2+1,
        dx:(Math.random()-0.5)*0.5,
        dy:(Math.random()-0.5)*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,77,109,0.7)";
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
